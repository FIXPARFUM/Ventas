<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIXPARFUM - Enlaces Oficiales</title>
    <style>
        /* Estilos base con estética Luxury Dark */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0d0d0d;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            padding: 10px;
        }

        /* Logo Oficial */
        .logo-img {
            width: 115px;
            height: 115px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 18px auto;
            border: 2px solid #d4af37;
            box-shadow: 0px 6px 25px rgba(212, 175, 55, 0.35);
            background-color: #1a1a1a;
            display: block;
        }

        /* Título Principal Dorado */
        h1 {
            font-size: 24px;
            letter-spacing: 4px;
            margin-bottom: 8px;
            color: #d4af37;
            font-weight: 700;
            text-transform: uppercase;
        }

        .bio {
            font-size: 14px;
            color: #aaaaaa;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        /* Texto en movimiento */
        .marquee-container {
            background-color: #111111;
            border-top: 1px solid #222222;
            border-bottom: 1px solid #222222;
            padding: 8px 0;
            margin-bottom: 15px;
        }

        .marquee-text {
            color: #d4af37;
            font-size: 12px;
            letter-spacing: 3px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Títulos de sección de Canales */
        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #d4af37;
            margin: 25px 0 14px 0;
            text-align: left;
            padding-left: 5px;
            font-weight: 600;
        }

        /* Título de Catálogo General */
        .catalog-title-container {
            margin: 30px 0 10px 0;
            text-align: left;
            padding-left: 5px;
        }

        .catalog-main-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #d4af37;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .catalog-sub-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #888888;
            font-weight: 500;
        }

        /* Títulos de Subcategorías (Diseñador / Árabe) */
        .category-subtitle {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #d4af37;
            text-align: left;
            padding-left: 8px;
            margin: 22px 0 12px 0;
            font-weight: 600;
            border-left: 2px solid #d4af37;
        }

        /* Botones Dorados Principales */
        .btn-gold {
            display: block;
            background: linear-gradient(135deg, #f3e7be 0%, #d4af37 50%, #aa841c 100%);
            color: #0d0d0d;
            text-decoration: none;
            padding: 16px;
            margin-bottom: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            border: none;
            box-shadow: 0px 4px 18px rgba(212, 175, 55, 0.2);
            transition: all 0.25s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-gold:active, .btn-perfume:active {
            transform: scale(0.97);
            opacity: 0.95;
        }

        /* Tarjetas de Perfumes */
        .btn-perfume {
            display: block;
            text-decoration: none;
            margin-bottom: 12px;
            border-radius: 12px;
            text-align: left;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            transition: all 0.25s ease;
        }

        /* COLORES PERSONALIZADOS PARA EL CATÁLOGO */
        .perfume-jpg { background-color: #0c121a; border: 1px solid #1a2636; border-left: 4px solid #d4af37; }
        .perfume-theone { background-color: #17110a; border: 1px solid #2b2014; border-left: 4px solid #b8860b; }
        .perfume-sauvage { background-color: #080f14; border: 1px solid #14222e; border-left: 4px solid #315f85; }
        .perfume-k { background-color: #0a141d; border: 1px solid #15293a; border-left: 4px solid #4182b3; }
        
        .perfume-asad { background-color: #17120e; border: 1px solid #292019; border-left: 4px solid #c59b6d; }
        .perfume-amethyst { background-color: #150f1c; border: 1px solid #281d36; border-left: 4px solid #a370dc; }
        .perfume-khamrah { background-color: #1a130c; border: 1px solid #332617; border-left: 4px solid #d99138; }

        /* Clase especial para productos AGOTADOS */
        .sold-out {
            opacity: 0.45; /* Lo vuelve más opaco y sutil */
            cursor: not-allowed;
            pointer-events: none; /* Evita que hagan clic */
        }

        .perfume-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .perfume-thumb {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .perfume-name {
            font-size: 14px;
            color: #ffffff;
            font-weight: 600;
        }

        /* Tag de consulta DISPONIBLE */
        .btn-action-tag {
            font-size: 12px;
            color: #d4af37;
            background-color: rgba(0, 0, 0, 0.4);
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            letter-spacing: 0.5px;
            border: 1px solid #d4af37;
            white-space: nowrap;
        }

        /* Tag especial para AGOTADO */
        .btn-sold-out-tag {
            font-size: 11px;
            color: #888888;
            background-color: #222222;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            letter-spacing: 0.5px;
            border: 1px solid #444444;
            white-space: nowrap;
        }
    </style>
</head>
