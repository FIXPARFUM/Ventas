<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIXPARFUM - Enlaces Oficiales</title>
    <style>
        /* Estilos base con estética Luxury Dark */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0d0d0d; /* Fondo negro profundo */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px; /* Tamaño perfecto para pantallas de celular */
            text-align: center;
            padding: 10px;
        }

        /* Estilo premium para el Logo */
        .logo-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 15px auto;
            border: 2px solid #d4af37; /* Borde dorado */
            box-shadow: 0px 6px 25px rgba(212, 175, 55, 0.35); /* Brillo sutil */
            background-color: #1a1a1a;
            display: block;
        }

        h1 {
            font-size: 24px;
            letter-spacing: 3px;
            margin-bottom: 8px;
            color: #f5f5f5;
            font-weight: 700;
            text-transform: uppercase;
        }

        .bio {
            font-size: 14px;
            color: #aaaaaa;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #d4af37; /* Dorado */
            margin: 25px 0 14px 0;
            text-align: left;
            padding-left: 5px;
            font-weight: 600;
        }

        /* Botones de acción general */
        .btn {
            display: block;
            background-color: #1a1a1a;
            color: #ffffff;
            text-decoration: none;
            padding: 16px;
            margin-bottom: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            border: 1px solid #2d2d2d;
            transition: all 0.25s ease;
        }

        /* Botón de Instagram Oficial */
        .btn-instagram {
            background: linear-gradient(45deg, #405DE6, #5851DB, #833AB4, #C13584, #E1306C, #FD1D1D);
            border: none;
            box-shadow: 0px 4px 15px rgba(193, 53, 132, 0.2);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        /* Botón de WhatsApp Principal */
        .btn-whatsapp-principal {
            background-color: #25D366;
            color: #000000;
            border: none;
            box-shadow: 0px 4px 15px rgba(37, 211, 102, 0.2);
        }

        /* Efecto al presionar botones en celular */
        .btn:active {
            transform: scale(0.97);
            opacity: 0.95;
        }

        /* Tarjetas de Perfumes del Catálogo */
        .btn-perfume {
            border-left: 4px solid #d4af37; /* Borde izquierdo dorado premium */
            text-align: left;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
        }

        .perfume-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        /* Miniatura de perfume redonda y elegante */
        .perfume-thumb {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            object-fit: cover;
            background-color: #1a1a1a;
            border: 1px solid #3d3d3d;
        }

        .perfume-name {
            font-size: 14px;
            color: #ffffff;
            font-weight: 600;
        }

        /* Botón interno de consulta rápida */
        .btn-action-tag {
            font-size: 12px;
            color: #d4af37;
            background-color: #262626;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            letter-spacing: 0.5px;
            border: 1px solid #3d3d3d;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .btn-perfume:active .btn-action-tag {
            background-color: #d4af37;
            color: #000000;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <img src="https://i.ibb.co/tTTyTBzB/file-00000000834071f5b7fff06eb67ee5e1.png" alt="FIXPARFUM Logo" class="logo-img">
        
        <h1>FIXPARFUM</h1>
        <p class="bio">Perfumes 100% originales en formato decant.<br>Envíos garantizados a todo Chile. ✨</p>

        <div class="section-title">Canales Oficiales</div>
        <a href="https://www.instagram.com/fixparfum.cl?igsh=MTNnbmRyMjMweW1jNQ==" target="_blank" class="btn btn-instagram">📸 Síguenos en Instagram</a>
        <a href="https://wa.me/56951732661?text=Hola!%20Vengo%20de%20tu%20página%20y%20me%20gustaría%20hacerte%20una%20consulta%20general." target="_blank" class="btn btn-whatsapp-principal">💬 WhatsApp Directo</a>

        <div class="section-title">Catálogo / Consultar Disponibilidad</div>
        
        <a href="https://wa.me/56951732661?text=Hola!%20Me%20interesa%20consultar%20por%20el%20decant%20de%20JPG%20Le%20Male%20Elixir." target="_blank" class="btn btn-perfume">
            <div class="perfume-info">
                <img src="https://i.ibb.co/BKtbKY7X/file-000000000434720ead593d6cc32f1c5a.png" alt="JPG Le Male Elixir" class="perfume-thumb">
                <span class="perfume-name">JPG Le Male Elixir</span>
            </div>
            <span class="btn-action-tag">Consultar</span>
        </a>

        <a href="https://wa.me/56951732661?text=Hola!%20Me%20interesa%20consultar%20por%20el%20decant%20de%20Lattafa%20Asad." target="_blank" class="btn btn-perfume">
            <div class="perfume-info">
                <img src="https://i.ibb.co/TxCgcxwC/file-0000000011a0720e8d52dcf267d53720.png" alt="Lattafa Asad" class="perfume-thumb">
                <span class="perfume-name">Lattafa Asad</span>
            </div>
            <span class="btn-action-tag">Consultar</span>
        </a>

        <a href="https://wa.me/56951732661?text=Hola!%20Me%20interesa%20consultar%20por%20el%20decant%20de%20Lattafa%20Bade'e%20Al%20Oud%20Amethyst." target="_blank" class="btn btn-perfume">
            <div class="perfume-info">
                <img src="https://i.ibb.co/Df55KnRp/file-0000000024b871f791318adc2fb8c90b.png" alt="Lattafa Amethyst" class="perfume-thumb">
                <span class="perfume-name">Lattafa Amethyst</span>
            </div>
            <span class="btn-action-tag">Consultar</span>
        </a>

    </div>

</body>
</html>
