<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIXPARFUM - Enlaces Oficiales</title>
    <style>
        /* Estilos base con estética Luxury Dark */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0d0d0d; /* Fondo negro profundo */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px; /* Tamaño perfecto para pantallas de celular */
            text-align: center;
            padding: 10px;
        }

        /* Logo circular premium */
        .logo-placeholder {
            width: 95px;
            height: 95px;
            background: linear-gradient(135deg, #d4af37, #aa841c);
            border-radius: 50%;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 26px;
            color: #000000;
            box-shadow: 0px 6px 20px rgba(212, 175, 55, 0.25);
            letter-spacing: 1px;
        }

        h1 {
            font-size: 24px;
            letter-spacing: 3px;
            margin-bottom: 8px;
            color: #f5f5f5;
            font-weight: 700;
        }

        .bio {
            font-size: 14px;
            color: #aaaaaa;
            margin-bottom: 35px;
            line-height: 1.4;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #d4af37; /* Dorado */
            margin: 30px 0 12px 0;
            text-align: left;
            padding-left: 5px;
            font-weight: 600;
        }

        /* Botones de acción */
        .btn {
            display: block;
            background-color: #1a1a1a;
            color: #ffffff;
            text-decoration: none;
            padding: 16px;
            margin-bottom: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            border: 1px solid #2d2d2d;
            transition: all 0.2s ease;
        }

        /* Botón de Instagram Oficial */
        .btn-instagram {
            background: linear-gradient(45deg, #405DE6, #5851DB, #833AB4, #C13584, #E1306C, #FD1D1D);
            border: none;
            box-shadow: 0px 4px 15px rgba(193, 53, 132, 0.2);
        }

        /* Botón de WhatsApp Principal */
        .btn-whatsapp-principal {
            background-color: #25D366;
            color: #000000;
            border: none;
            box-shadow: 0px 4px 15px rgba(37, 211, 102, 0.2);
        }

        /* Comportamiento al presionar botones en celular */
        .btn:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        /* Botones del Catálogo de Perfumes */
        .btn-perfume {
            border-left: 4px solid #d4af37; /* Detalle de lujo en el borde izquierdo */
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-perfume span {
            font-size: 13px;
            color: #d4af37;
            background-color: #262626;
            padding: 5px 12px;
            border-radius: 6px;
            font-weight: bold;
            letter-spacing: 0.5px;
            border: 1px solid #3d3d3d;
        }
    </style>
</head>
<body>

    <div class="container">

        <p class="bio">Perfumes 100% originales en formato decant.<br>Envíos garantizados a todo Chile. ✨</p>

        <a href="https://www.instagram.com/fixparfum.cl?igsh=MTNnbmRyMjMweW1jNQ==" target="_blank" class="btn btn-instagram">📸 Síguenos en Instagram</a>
        <a href="https://wa.me/56951732661?text=Hola!%20Vengo%20de%20tu%20página%20y%20me%20gustaría%20hacerte%20una%20consulta%20general." target="_blank" class="btn btn-whatsapp-principal">💬 WhatsApp Directo</a>

        <div class="section-title">Catálogo y Precios</div>
        
        <a href="https://wa.me/56951732661?text=Hola!%20Me%20interesa%20comprar%20el%20decant%20de%20JPG%20Le%20Male%20Elixir%20de%203ml%20($7.200)" target="_blank" class="btn btn-perfume">
            JPG Le Male Elixir (3ml) <span>$7.200</span>
        </a>

        <a href="https://wa.me/56951732661?text=Hola!%20Me%20interesa%20comprar%20el%20decant%20de%20JPG%20Le%20Male%20Elixir%20de%205ml%20($11.500)" target="_blank" class="btn btn-perfume">
            JPG Le Male Elixir (5ml) <span>$11.500</span>

        <a href="https://wa.me/56951732661?text=Hola!%20Me%20interesa%20comprar%20el%20decant%20de%20Lattafa%20Bade'e%20Al%20Oud%20Amethyst%20de%205ml%20($4.500)" target="_blank" class="btn btn-perfume">
            Lattafa Amethyst (5ml) <span>$4.500</span>
        </a>

        <a href="https://wa.me/56951732661?text=Hola!%20Me%20interesa%20comprar%20el%20decant%20de%20Lattafa%20Asad%20de%205ml%20($4.200)" target="_blank" class="btn btn-perfume">
            Lattafa Asad (5ml) <span>$4.200</span>
        </a>

    </div>

</body>
</html>
